<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="./css/style.css" />
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
      integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.7.0/css/all.css"
      integrity="sha384-lZN37f5QGtY3VHgisS14W3ExzMWZxybE1SJSEsQp9S+oqd12jhcu+A56Ebc1zFSJ"
      crossorigin="anonymous"
    />
    <link rel="shortcut icon" href="./img/Logo_iCare_Work.gif" />
    <title>iCARE</title>
  </head>
  <body>
    <nav class="navbar navbar-light bg-light" style="height: 100px">
      <div class="container logos">
        <div class="logos">
          <a class="" href="#"
            ><img
              src="img/Logo_iCare_Work.gif"
              alt=""
              style="border-right: black 1px solid"
          /></a>
          <a class="ucolMD" href="#"
            ><img src="img/UdeC_logo.png" alt="" style="padding-left: 10px"
          /></a>
          <a class="ucolXL" href="#"
            ><img
              src="img/Logo_de_la_Universidad_de_Colima.svg.png"
              alt=""
              style="padding-left: 10px"
          /></a>
        </div>
      </div>
    </nav>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <button
        class="navbar-toggler"
        type="button"
        data-toggle="collapse"
        data-target="#navbarNav"
        aria-controls="navbarNav"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <div class="container">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link disabled" href="#">INICIO</a>
            </li>
            <li class="nav-item active navButtom">
              <a class="nav-link disabled" href="#">NOSOTROS</a>
            </li>
            <li class="nav-item active navButtom">
              <a class="nav-link" href="#">PRODUCTOS</a>
            </li>
            <li class="nav-item active navButtom">
              <a class="nav-link" href="#">CONTACTOS</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="floatBar">
      <form class="form-inline ml-auto searchbar">
        <input
          type="search"
          placeholder="Buscar en iCARE"
          name="search"
          class="searchbar-input"
          onkeyup="buttonUp();"
          required
        />
        <input type="submit" class="searchbar-submit" value="GO" />
        <span class="searchbar-icon" id="search-button"
          ><i class="fas fa-search" id="icon" aria-hidden="true"></i
        ></span>
      </form>
    </div>
    <div class="fluid-container">
      <img src="/img/the-rock-look-the-rock-meme.gif" />
    </div>
  </body>
</html>
